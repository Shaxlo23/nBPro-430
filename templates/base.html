{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    /* =========================
       ULTRA PREMIUM DARK UI
    ========================== */

    body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", Arial, sans-serif;
        color: #eaeaea;
        overflow-x: hidden;
        position: relative;

        /* animated subtle gradient */
        background: linear-gradient(-45deg, #050505, #0b0b12, #0a0a1a, #050505);
        background-size: 400% 400%;
        animation: bgMove 18s ease infinite;
    }

    @keyframes bgMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* GRID OVERLAY */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
            linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        z-index: -2;
        pointer-events: none;
    }

    /* GLOW ORBS */
    body::after {
        content: "";
        position: fixed;
        inset: 0;

        background:
            radial-gradient(circle at 15% 20%, rgba(124,58,237,0.18), transparent 35%),
            radial-gradient(circle at 85% 80%, rgba(59,130,246,0.16), transparent 40%),
            radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04), transparent 60%);

        filter: blur(80px);
        z-index: -1;
        pointer-events: none;
    }

    /* =========================
       LINKS
    ========================== */
    a {
        text-decoration: none;
        color: inherit;
        transition: 0.2s;
    }

    a:hover {
        opacity: 0.8;
    }

    /* =========================
       MAIN CONTAINER
    ========================== */
    .main-container {
        width: 92%;
        max-width: 1200px;
        margin: auto;
        padding: 50px 0;
    }

    /* =========================
       PREMIUM CARD (GLASS 2.0)
    ========================== */
    .dark-card {
        background: rgba(20, 20, 25, 0.6);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;

        padding: 22px;

        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);

        box-shadow:
            0 0 0 1px rgba(255,255,255,0.02),
            0 20px 60px rgba(0,0,0,0.6);

        transition: 0.25s;
    }

    .dark-card:hover {
        transform: translateY(-3px);
        box-shadow:
            0 0 0 1px rgba(255,255,255,0.03),
            0 25px 80px rgba(0,0,0,0.7);
    }

    /* =========================
       BUTTONS (NEON GRADIENT)
    ========================== */
    .btn-dark-custom {
        background: linear-gradient(135deg, #7c3aed, #2563eb);
        border: none;
        color: white;
        padding: 10px 18px;
        border-radius: 12px;
        font-weight: 600;
        transition: 0.25s;
        box-shadow: 0 0 25px rgba(124,58,237,0.25);
    }

    .btn-dark-custom:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 0 40px rgba(124,58,237,0.4);
    }

    /* =========================
       INPUTS (MODERN)
    ========================== */
    input,
    textarea,
    select {
        background: rgba(10,10,10,0.8) !important;
        border: 1px solid rgba(255,255,255,0.08) !important;
        color: white !important;
        border-radius: 12px !important;
        padding: 10px !important;
        transition: 0.2s;
    }

    input:focus,
    textarea:focus,
    select:focus {
        border-color: #7c3aed !important;
        box-shadow: 0 0 0 3px rgba(124,58,237,0.2) !important;
        outline: none !important;
    }

    /* =========================
       TEXT HR
    ========================== */
    hr {
        border-color: rgba(255,255,255,0.08);
    }

    /* SCROLLBAR (PREMIUM TOUCH) */
    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-thumb {
        background: linear-gradient(#7c3aed, #2563eb);
        border-radius: 10px;
    }

    </style>

</head>

<body>

    {% include 'navbar.html' %}

    <div class="main-container">
        {% block content %}
        {% endblock %}
    </div>

    {% include 'footer.html' %}

</body>
</html>
