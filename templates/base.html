<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0f0f0f;
            color:white;
            font-family:Arial, Helvetica, sans-serif;
            min-height:100vh;
        }

        a{
            text-decoration:none;
        }

        .main-container{
            width:90%;
            max-width:1200px;
            margin:auto;
            padding:30px 0;
        }

        .dark-card{
            background:#1a1a1a;
            border:1px solid #2d2d2d;
            border-radius:15px;
            padding:20px;
            box-shadow:0 0 15px rgba(0,0,0,0.4);
        }

        .btn-dark-custom{
            background:#7c3aed;
            border:none;
            color:white;
            padding:10px 18px;
            border-radius:10px;
            transition:0.3s;
            font-weight:bold;
        }

        .btn-dark-custom:hover{
            background:#9254ff;
            transform:scale(1.03);
        }

        input,
        textarea{
            background:#121212 !important;
            border:1px solid #333 !important;
            color:white !important;
        }

        input:focus,
        textarea:focus{
            box-shadow:none !important;
            border:1px solid #7c3aed !important;
        }

        hr{
            border-color:#333;
        }

    </style>

</head>

<body>

    {% include 'navbar.html' %}

    <div class="main-container">

        {% block content %}
        
        {% endblock %}

    </div>

    {% include 'footer.html' %}

</body>
</html>
