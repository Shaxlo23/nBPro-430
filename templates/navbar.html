<div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:#0f0f0f;
    border-bottom:1px solid #2a2a2a;
    font-family:Arial, Helvetica, sans-serif;
    position:sticky;
    top:0;
    z-index:1000;
">

    <!-- Logo -->
    <h1 style="margin:0;">
        <a href="{% url 'home_view' %}" style="
            text-decoration:none;
            color:white;
            font-weight:bold;
            letter-spacing:1px;
        ">
            ⚡ My App
        </a>
    </h1>

    <!-- Menu -->
    <div style="
        display:flex;
        gap:10px;
        align-items:center;
        flex-wrap:wrap;
    ">

        <a href="{% url 'user_create' %}"
           style="
              padding:8px 14px;
              background:#1f1f1f;
              color:white;
              text-decoration:none;
              border-radius:10px;
              border:1px solid #2d2d2d;
              transition:0.3s;
           ">
            + Create User
        </a>

        {% if user.is_authenticated %}

            <a href="{% url 'profile' %}"
               style="
                  padding:8px 14px;
                  background:#7c3aed;
                  color:white;
                  text-decoration:none;
                  border-radius:10px;
                  transition:0.3s;
               ">
                👤 Profile
            </a>

            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}

                <button type="submit"
                    style="
                        padding:8px 14px;
                        background:#ef4444;
                        color:white;
                        border:none;
                        border-radius:10px;
                        cursor:pointer;
                        transition:0.3s;
                    ">
                    Logout
                </button>
            </form>

        {% else %}

            <a href="{% url 'login' %}"
               style="
                  padding:8px 14px;
                  background:#2563eb;
                  color:white;
                  text-decoration:none;
                  border-radius:10px;
               ">
                Login
            </a>

            <a href="{% url 'register' %}"
               style="
                  padding:8px 14px;
                  background:#16a34a;
                  color:white;
                  text-decoration:none;
                  border-radius:10px;
               ">
                Register
            </a>

        {% endif %}

    </div>

</div>
