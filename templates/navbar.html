<div style="display:flex; justify-content:space-between; align-items:center; margin:10px 0;">

    <h1>
        <a href="{% url 'home_view' %}" style="text-decoration:none; color:black;">
            My App
        </a>
    </h1>

    <div style="display:flex; gap:10px; align-items:center;">

        <a href="{% url 'user_create' %}"
           style="padding:8px 12px;
                  background:black;
                  color:white;
                  text-decoration:none;
                  border-radius:5px;">
            + User Create
        </a>

        {% if user.is_authenticated %}

            <a href="{% url 'profile' %}"
               style="padding:8px 12px;
                      background:purple;
                      color:white;
                      text-decoration:none;
                      border-radius:5px;">
                Profile
            </a>

            <a href="{% url 'logout' %}"
               style="padding:8px 12px;
                      background:red;
                      color:white;
                      text-decoration:none;
                      border-radius:5px;">
                Logout
            </a>

        {% else %}

            <a href="{% url 'login' %}"
               style="padding:8px 12px;
                      background:blue;
                      color:white;
                      text-decoration:none;
                      border-radius:5px;">
                Login
            </a>

            <a href="{% url 'register' %}"
               style="padding:8px 12px;
                      background:green;
                      color:white;
                      text-decoration:none;
                      border-radius:5px;">
                Register
            </a>

        {% endif %}

    </div>

</div>
