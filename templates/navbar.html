<div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 32px;
    background:rgba(15,15,15,0.85);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    position:sticky;
    top:0;
    z-index:1000;
">

    <!-- Logo -->
    <a href="{% url 'home_view' %}" style="
        text-decoration:none;
        font-size:26px;
        font-weight:800;
        color:white;
        letter-spacing:1px;
    ">
        ⚡ My App
    </a>

    <!-- Navigation -->
    <div style="
        display:flex;
        align-items:center;
        gap:12px;
    ">

        <a href="{% url 'user_create' %}" style="
            text-decoration:none;
            color:#d4d4d8;
            background:#18181b;
            padding:10px 16px;
            border-radius:12px;
            border:1px solid #27272a;
            transition:.3s;
        ">
            + User
        </a>

        <a href="{% url 'post_list' %}" style="
            text-decoration:none;
            color:#d4d4d8;
            background:#18181b;
            padding:10px 16px;
            border-radius:12px;
            border:1px solid #27272a;
            transition:.3s;
        ">
            📝 Posts
        </a>

        {% if user.is_authenticated %}

            <a href="{% url 'profile' %}" style="
                text-decoration:none;
                color:white;
                background:linear-gradient(135deg,#7c3aed,#a855f7);
                padding:10px 16px;
                border-radius:12px;
                font-weight:600;
                box-shadow:0 0 20px rgba(124,58,237,.35);
            ">
                👤 Profile
            </a>

            <form action="{% url 'logout' %}" method="post" style="margin:0;">
                {% csrf_token %}
                <button type="submit" style="
                    padding:10px 16px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(135deg,#dc2626,#ef4444);
                    color:white;
                    cursor:pointer;
                    font-weight:600;
                    box-shadow:0 0 18px rgba(239,68,68,.25);
                ">
                    Logout
                </button>
            </form>

        {% else %}

            <a href="{% url 'login' %}" style="
                text-decoration:none;
                color:white;
                background:linear-gradient(135deg,#2563eb,#3b82f6);
                padding:10px 16px;
                border-radius:12px;
                font-weight:600;
                box-shadow:0 0 18px rgba(59,130,246,.25);
            ">
                Login
            </a>

            <a href="{% url 'register' %}" style="
                text-decoration:none;
                color:white;
                background:linear-gradient(135deg,#16a34a,#22c55e);
                padding:10px 16px;
                border-radius:12px;
                font-weight:600;
                box-shadow:0 0 18px rgba(34,197,94,.25);
            ">
                Register
            </a>

        {% endif %}

    </div>

</div>
