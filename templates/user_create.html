{% extends 'base.html' %}

{% block content %}

<div style="
    max-width:520px;
    margin:60px auto;
">

    <div class="dark-card">

        <h1 style="
            text-align:center;
            margin-bottom:10px;
            font-weight:bold;
        ">
            ➕ Create User
        </h1>

        <p style="
            text-align:center;
            color:#8a8a8a;
            margin-bottom:20px;
        ">
            Add new user | Yangi user qo‘shish
        </p>

        <form method="post" enctype="multipart/form-data">

            {% csrf_token %}

            <label style="color:#ccc;">First Name</label>
            <input type="text" name="first_name"
                   style="
                        width:100%;
                        padding:10px;
                        margin:8px 0 15px 0;
                        border-radius:10px;
                        border:1px solid #2d2d2d;
                        background:#121212;
                        color:white;
                   ">

            <label style="color:#ccc;">Last Name</label>
            <input type="text" name="last_name"
                   style="
                        width:100%;
                        padding:10px;
                        margin:8px 0 15px 0;
                        border-radius:10px;
                        border:1px solid #2d2d2d;
                        background:#121212;
                        color:white;
                   ">

            <label style="color:#ccc;">Email</label>
            <input type="email" name="email"
                   style="
                        width:100%;
                        padding:10px;
                        margin:8px 0 15px 0;
                        border-radius:10px;
                        border:1px solid #2d2d2d;
                        background:#121212;
                        color:white;
                   ">

            <label style="color:#ccc;">Phone Number</label>
            <input type="text" name="phone_number"
                   style="
                        width:100%;
                        padding:10px;
                        margin:8px 0 15px 0;
                        border-radius:10px;
                        border:1px solid #2d2d2d;
                        background:#121212;
                        color:white;
                   ">

            <label style="color:#ccc;">Avatar</label>
            <input type="file" name="avatar"
                   style="
                        margin:10px 0 20px 0;
                        color:#aaa;
                   ">

            <button type="submit"
                    class="btn-dark-custom"
                    style="width:100%;">
                🚀 Create User
            </button>

        </form>

    </div>

</div>

{% endblock %}
