{% extends 'base.html' %}

{% block content %}

<div style="
    max-width:900px;
    margin:auto;
;">

    <div class="dark-card">

        {% if post.image %}
            <img 
                src="{{ post.image.url }}"
                alt="{{ post.title }}"
                style="
                    width:100%;
                    max-height:450px;
                    object-fit:cover;
                    border-radius:15px;
                    margin-bottom:20px;
                "
            >
        {% endif %}

        <h1 style="
            font-weight:bold;
            margin-bottom:15px;
        ">
            {{ post.title }}
        </h1>

        <p style="
            color:#9b9b9b;
            margin-bottom:20px;
        ">
            👤 
            <a 
                href="{% url 'user_view' post.author.slug %}"
                style="
                    color:#9b9b9b;
                    text-decoration:none;
                "
            >
                {{ post.author.first_name }} {{ post.author.last_name }}
            </a>

            • {{ post.created_at|date:"d M Y" }}
        </p>

        <hr>

        <p style="
            line-height:1.9;
            font-size:18px;
            color:#d6d6d6;
            margin-top:20px;
        ">
            {{ post.content }}
        </p>

    </div>

</div>

{% endblock %}
