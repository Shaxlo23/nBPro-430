{% extends 'base.html' %}

{% block content %}

<div style="
    max-width:520px;
    margin:60px auto;
">

    <div class="dark-card">

        <h1 style="
            text-align:center;
            margin-bottom:10px;
            font-weight:bold;
        ">
            ✏️ Update User
        </h1>

        <p style="
            text-align:center;
            color:#8a8a8a;
            margin-bottom:20px;
        ">
            Edit profile | Ma’lumotlarni yangilash
        </p>

        <form method="post" enctype="multipart/form-data">

            {% csrf_token %}

            <!-- FIRST NAME -->
            <label style="color:#ccc;">First Name</label>
            <input type="text"
                   name="first_name"
                   value="{{ user.first_name }}"
                   style="
                        width:100%;
                        padding:10px;
                        margin:8px 0 15px 0;
                        border-radius:10px;
                        border:1px solid #2d2d2d;
                        background:#121212;
                        color:white;
                   ">

            <!-- LAST NAME -->
            <label style="color:#ccc;">Last Name</label>
            <input type="text"
                   name="last_name"
                   value="{{ user.last_name }}"
                   style="
                        width:100%;
                        padding:10px;
                        margin:8px 0 15px 0;
                        border-radius:10px;
                        border:1px solid #2d2d2d;
                        background:#121212;
                        color:white;
                   ">

            <!-- EMAIL -->
            <label style="color:#ccc;">Email</label>
            <input type="email"
                   name="email"
                   value="{{ user.email }}"
                   style="
                        width:100%;
                        padding:10px;
                        margin:8px 0 15px 0;
                        border-radius:10px;
                        border:1px solid #2d2d2d;
                        background:#121212;
                        color:white;
                   ">

            <!-- PHONE -->
            <label style="color:#ccc;">Phone Number</label>
            <input type="text"
                   name="phone_number"
                   value="{{ user.phone_number }}"
                   style="
                        width:100%;
                        padding:10px;
                        margin:8px 0 15px 0;
                        border-radius:10px;
                        border:1px solid #2d2d2d;
                        background:#121212;
                        color:white;
                   ">

            <!-- WEBSITE (NEW) -->
            <label style="color:#ccc;">Website</label>
            <input type="text"
                   name="website"
                   value="{{ user.website }}"
                   placeholder="https://..."
                   style="
                        width:100%;
                        padding:10px;
                        margin:8px 0 15px 0;
                        border-radius:10px;
                        border:1px solid #2d2d2d;
                        background:#121212;
                        color:white;
                   ">

            <!-- BIO (NEW) -->
            <label style="color:#ccc;">Bio</label>
            <textarea name="bio"
                      rows="4"
                      style="
                        width:100%;
                        padding:10px;
                        margin:8px 0 15px 0;
                        border-radius:10px;
                        border:1px solid #2d2d2d;
                        background:#121212;
                        color:white;
                      ">{{ user.bio }}</textarea>

            <!-- AVATAR -->
            <label style="color:#ccc;">Current Avatar</label>
            <div style="margin:10px 0 15px 0; text-align:center;">

                {% if user.avatar %}
                    <img src="{{ user.avatar.url }}"
                         style="
                            width:120px;
                            height:120px;
                            object-fit:cover;
                            border-radius:50%;
                            border:3px solid #7c3aed;
                         ">
                {% else %}
                    <p style="color:#777;">No avatar</p>
                {% endif %}

            </div>

            <label style="color:#ccc;">New Avatar</label>
            <input type="file"
                   name="avatar"
                   style="
                        margin:10px 0 20px 0;
                        color:#aaa;
                   ">

            <!-- BUTTON -->
            <button type="submit"
                    class="btn-dark-custom"
                    style="width:100%;">
                💾 Update User
            </button>

        </form>

    </div>

</div>

{% endblock %}
