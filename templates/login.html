{% extends 'base.html' %}

{% block content %}

<div style="
    max-width:450px;
    margin:60px auto;
">

    <div class="dark-card">

        <h1 style="
            text-align:center;
            margin-bottom:10px;
            font-weight:bold;
        ">
            🔐 Login
        </h1>

        <p style="
            text-align:center;
            color:#8a8a8a;
            margin-bottom:25px;
        ">
            Welcome back 👋 Please login to your account
        </p>

        <form method="post">

            {% csrf_token %}

            <div style="margin-bottom:15px;">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn-dark-custom" style="width:100%;">
                Login →
            </button>

        </form>

        <hr>

        <p style="
            text-align:center;
            color:#666;
            margin:0;
            font-size:14px;
        ">
            Login page ishlayapti ✅ / Login system ready
        </p>

    </div>

</div>

{% endblock %}
