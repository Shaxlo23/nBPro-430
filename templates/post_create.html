{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: #0b0c10;
        font-family: Arial, sans-serif;
    }

    .glass {
        max-width: 650px;
        margin: 50px auto;
        padding: 25px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        color: #e6e6e6;
    }

    .title {
        text-align: center;
        font-size: 28px;
        margin-bottom: 20px;
        font-weight: bold;
        letter-spacing: 1px;
        color: #ffffff;
    }

    .field {
        margin-bottom: 18px;
    }

    .field label {
        display: block;
        margin-bottom: 6px;
        color: #b5b5b5;
        font-size: 14px;
    }

    .field input,
    .field textarea {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(0,0,0,0.4);
        color: white;
        outline: none;
        transition: 0.2s;
    }

    .field input:focus,
    .field textarea:focus {
        border-color: #7c5cff;
        box-shadow: 0 0 10px rgba(124,92,255,0.4);
    }

    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #7c5cff, #00d4ff);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn:hover {
        transform: scale(1.02);
        opacity: 0.9;
    }
</style>

<div class="glass">

    <div class="title">✨ Create New Post</div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="field">
            <label>Title</label>
            {{ form.title }}
        </div>

        <div class="field">
            <label>Content</label>
            {{ form.content }}
        </div>

        <div class="field">
            <label>Image</label>
            {{ form.image }}
        </div>

        <button class="btn" type="submit">
            Publish ✨
        </button>

    </form>

</div>

{% endblock %}
