<h2 style="margin-bottom:10px; font-family:Arial;">
    <b>{{ user.first_name }} {{ user.last_name }}</b>
</h2>

<hr>

<div style="border:1px solid #ccc; margin:10px; padding:15px; border-radius:8px; font-family:Arial;">

    <img src="{{ user.avatar.url }}" width="150px" style="border-radius:8px;">

    <hr>

    <p style="font-size:15px;">
        <b style="color:#333;">Email:</b> {{ user.email }}
    </p>

    <hr>

    <p style="font-size:15px;">
        <b style="color:#333;">Phone_number:</b> {{ user.phone_number }}
    </p>

    <hr>

    <p style="font-size:15px;">
        <b style="color:#333;">Created_At:</b> {{ user.created_at }}
    </p>

    <hr>

</div>
